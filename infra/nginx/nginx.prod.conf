events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;
    keepalive_timeout 65;
    client_max_body_size 50M;

    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=webhook_zone:10m rate=200r/m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── HTTP → HTTPS redirect + ACME ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── app.kachu.tw ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name app.kachu.tw kachu.tw www.kachu.tw;

        ssl_certificate     /etc/letsencrypt/live/app.kachu.tw/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.kachu.tw/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Health check (no rate limit)
        location = /health {
            set $upstream http://kachu:8001;
            proxy_pass $upstream;
            access_log off;
        }

        # LINE / Google webhooks (higher rate limit)
        location /webhooks/ {
            limit_req zone=webhook_zone burst=100 nodelay;
            set $upstream http://kachu:8001;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Dashboard + API (all other routes)
        location / {
            limit_req zone=api_zone burst=30 nodelay;
            set $upstream http://kachu:8001;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
